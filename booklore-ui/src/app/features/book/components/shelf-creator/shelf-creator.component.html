<ng-container *transloco="let t; prefix: 'book.shelfCreator'">
<div class="flex-1 min-h-0 overflow-y-auto px-5 py-5 space-y-5" (scroll)="modalRef.reportScroll($event)">

  <!-- Shelf name + icon -->
  <div>
    <label for="shelfName" class="block text-sm font-medium text-ink mb-1.5">
      {{ t('shelfNameLabel') }}
      <span class="text-status-abandoned">*</span>
    </label>
    <div class="relative">
      <input id="shelfName" type="text" appInput [(ngModel)]="shelfName" [placeholder]="t('shelfNamePlaceholder')" class="!pr-10" />
      <button type="button" (click)="selectedIcon ? clearSelectedIcon() : openIconPicker()"
        class="absolute right-1.5 top-1/2 -translate-y-1/2 flex items-center justify-center rounded-[4px] transition-colors cursor-pointer hover:bg-surface-hover px-1.5 h-7"
        [class]="selectedIcon ? 'text-accent' : 'text-ink-muted'">
        @if (selectedIcon) {
          <app-icon-display [icon]="selectedIcon" size="16px" />
        } @else {
          <span class="text-xs">{{ t('chooseIcon') }}</span>
        }
      </button>
    </div>
  </div>

  @if (isAdmin) {
    <app-divider />

    <div>
      <span class="text-sm font-medium text-ink">{{ t('visibilityLabel') }}</span>
      <div class="mt-1.5"><app-toggle [(checked)]="isPublic" /></div>
      <p class="text-xs text-ink-muted mt-1.5">{{ t('makePublicLabel') }}</p>
    </div>
  }
</div>

<div class="shrink-0 flex items-center justify-between px-5 py-3.5 border-t border-edge">
  <div>
    @if (!shelfName.trim()) {
      <span class="flex items-center gap-1.5 text-sm text-status-to-read">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>
        </svg>
        {{ t('validationRequired') }}
      </span>
    } @else {
      <span class="flex items-center gap-1.5 text-sm text-status-finished">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/>
        </svg>
        {{ t('validationReady') }}
      </span>
    }
  </div>
  <div class="flex items-center gap-2">
    <app-button variant="primary" (click)="createShelf()" [disabled]="!shelfName.trim()">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14"/><path d="M12 5v14"/>
      </svg>
      {{ t('createButton') }}
    </app-button>
    <app-button variant="secondary" (click)="cancel()">{{ t('cancelButton') }}</app-button>
  </div>
</div>
</ng-container>
