<ng-container *transloco="let t; prefix: 'book.addPhysicalBook'">
  <!-- Scrollable body -->
  <div class="flex-1 min-h-0 overflow-y-auto px-5 py-5 space-y-5" (scroll)="modalRef.reportScroll($event)">

    <!-- Library selector -->
    <div>
      <label class="block text-sm font-medium text-ink mb-1.5">
        {{ t('libraryLabel') }} <span class="text-status-abandoned">*</span>
      </label>
      <p-select
        [options]="libraries"
        [(ngModel)]="selectedLibraryId"
        optionLabel="name"
        optionValue="id"
        [placeholder]="t('libraryPlaceholder')"
        [style]="{'width': '100%'}"
      />
    </div>

    <app-divider />

    <!-- Title + ISBN + cover preview -->
    <div class="flex gap-4">
      @if (coverUrl) {
        <div class="shrink-0">
          <img [src]="coverUrl" alt="Book cover" class="h-[180px] rounded-[6px] border border-edge shadow-paper object-contain" />
        </div>
      }
      <div class="flex-1 min-w-0 space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-[2fr_1fr] gap-4">
          <div>
            <label class="block text-sm font-medium text-ink mb-1.5">{{ t('titleLabel') }}</label>
            <input appInput [(ngModel)]="title" [placeholder]="t('titlePlaceholder')" />
          </div>
          <div>
            <label class="block text-sm font-medium text-ink mb-1.5">{{ t('isbnLabel') }}</label>
            <div class="flex items-center gap-1.5">
              <input appInput [(ngModel)]="isbn" [placeholder]="t('isbnPlaceholder')" class="flex-1" />
              <button type="button" (click)="fetchMetadataByIsbn()"
                [disabled]="!isbn.trim() || isFetchingMetadata"
                class="flex items-center justify-center w-9 h-9 shrink-0 rounded-[6px] bg-surface-raised shadow-paper text-ink-muted hover:text-accent hover:shadow-paper-hover transition-all cursor-pointer disabled:opacity-50 disabled:pointer-events-none">
                @if (isFetchingMetadata) {
                  <svg class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                } @else {
                  <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                }
              </button>
            </div>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-ink mb-1.5">{{ t('authorsLabel') }}</label>
          <p-autoComplete
            appendTo="body"
            [(ngModel)]="authors"
            [multiple]="true"
            [fluid]="true"
            [dropdown]="false"
            [suggestions]="filteredAuthors"
            [forceSelection]="false"
            [showClear]="false"
            [placeholder]="t('authorsPlaceholder')"
            (completeMethod)="filterAuthors($event)"
            (onKeyUp)="onAutoCompleteKeyUp('authors', $event)"
            (onSelect)="onAutoCompleteSelect('authors', $event)"
          />
        </div>
      </div>
    </div>

    <app-divider />

    <!-- Description -->
    <div>
      <label class="block text-sm font-medium text-ink mb-1.5">{{ t('descriptionLabel') }}</label>
      <textarea appInput [(ngModel)]="description" rows="3" [placeholder]="t('descriptionPlaceholder')"></textarea>
    </div>

    <app-divider />

    <!-- Publisher + Published Date -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-ink mb-1.5">{{ t('publisherLabel') }}</label>
        <input appInput [(ngModel)]="publisher" [placeholder]="t('publisherPlaceholder')" />
      </div>
      <div>
        <label class="block text-sm font-medium text-ink mb-1.5">{{ t('publishedDateLabel') }}</label>
        <input appInput [(ngModel)]="publishedDate" [placeholder]="t('publishedDatePlaceholder')" />
      </div>
    </div>

    <!-- Language + Page Count -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-ink mb-1.5">{{ t('languageLabel') }}</label>
        <input appInput [(ngModel)]="language" [placeholder]="t('languagePlaceholder')" />
      </div>
      <div>
        <label class="block text-sm font-medium text-ink mb-1.5">{{ t('pageCountLabel') }}</label>
        <input appInput type="number" [(ngModel)]="pageCount" [placeholder]="t('pageCountPlaceholder')" />
      </div>
    </div>

    <app-divider />

    <!-- Categories -->
    <div>
      <label class="block text-sm font-medium text-ink mb-1.5">{{ t('categoriesLabel') }}</label>
      <p-autoComplete
        appendTo="body"
        [(ngModel)]="categories"
        [multiple]="true"
        [fluid]="true"
        [dropdown]="false"
        [suggestions]="filteredCategories"
        [forceSelection]="false"
        [showClear]="true"
        [placeholder]="t('categoriesPlaceholder')"
        (completeMethod)="filterCategories($event)"
        (onKeyUp)="onAutoCompleteKeyUp('categories', $event)"
        (onSelect)="onAutoCompleteSelect('categories', $event)"
      />
    </div>
  </div>

  <!-- Footer -->
  <div class="shrink-0 flex items-center justify-between px-5 py-3.5 border-t border-edge">
    <div class="flex-1 min-w-0">
      @if (!selectedLibraryId) {
        <div class="flex items-center gap-1.5 text-sm text-status-to-read">
          <svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/>
          </svg>
          {{ t('validationLibraryRequired') }}
        </div>
      } @else if (!title.trim() && !isbn.trim()) {
        <div class="flex items-center gap-1.5 text-sm text-status-to-read">
          <svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/>
          </svg>
          {{ t('validationTitleOrIsbn') }}
        </div>
      } @else {
        <div class="flex items-center gap-1.5 text-sm text-status-finished">
          <svg class="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>
          </svg>
          {{ t('validationReady') }}
        </div>
      }
    </div>
    <div class="flex items-center gap-2">
      <app-button variant="secondary" (click)="modalRef.close()">{{ t('cancelButton') }}</app-button>
      <app-button variant="primary" [disabled]="!canCreate() || isLoading" (click)="createBook()">{{ t('addButton') }}</app-button>
    </div>
  </div>
</ng-container>
