<ng-container *transloco="let t; prefix: 'book.shelfAssigner'">
<div class="flex-1 min-h-0 overflow-y-auto px-5 py-5 space-y-5" (scroll)="modalRef.reportScroll($event)">
  @if (shelves(); as shelves) {
    @if (shelves.length > 0) {
      <div class="flex flex-col gap-3">
        <div>
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-ink-muted pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input appInput class="!pl-9 !pr-8" type="text" [(ngModel)]="searchQuery" [placeholder]="t('searchPlaceholder')" />
            @if (searchQuery) {
              <button type="button" class="absolute right-2 top-1/2 -translate-y-1/2 text-ink-muted hover:text-ink cursor-pointer" (click)="searchQuery = ''">
                <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
              </button>
            }
          </div>
        </div>

        <div class="flex flex-col gap-2">
          @for (shelf of filterShelves(shelves); track shelf.id) {
            <div
              class="flex items-center gap-3 px-3 py-2 rounded-lg border transition-colors cursor-pointer"
              [class]="isShelfSelected(shelf) ? 'border-accent/40 bg-accent/5' : 'border-edge bg-surface-raised hover:border-ink-muted/30'"
              (click)="toggleShelf(shelf, !isShelfSelected(shelf))"
            >
              <app-checkbox
                [checked]="isShelfSelected(shelf)"
                (click)="$event.stopPropagation()"
                (checkedChange)="toggleShelf(shelf, $event)"
              >
              </app-checkbox>
              <div class="flex items-center gap-2.5 min-w-0">
                @if (shelf.icon) {
                  <div class="flex items-center justify-center w-8 h-8 rounded-md bg-surface-hover shrink-0">
                    <app-icon-display
                      [icon]="getShelfIcon(shelf)"
                      size="18px"
                    />
                  </div>
                }
                <span class="text-sm font-medium text-ink truncate">{{ shelf.name }}</span>
              </div>
            </div>
          }
        </div>
      </div>
    } @else {
      <div class="flex flex-col items-center justify-center text-center py-8">
        <div class="flex items-center justify-center w-16 h-16 rounded-full bg-surface-hover mb-3">
          <svg class="w-8 h-8 text-ink-muted opacity-50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        </div>
        <h3 class="text-base font-semibold text-ink mb-1">{{ t('emptyTitle') }}</h3>
        <p class="text-sm text-ink-muted max-w-[350px] leading-relaxed" [innerHTML]="t('emptyDescription')"></p>
      </div>
    }
  }
</div>

<div class="shrink-0 flex items-center justify-between px-5 py-3.5 border-t border-edge">
  <app-button variant="ghost" (click)="createShelfDialog()">
    <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
    {{ t('createShelf') }}
  </app-button>
  <div class="flex items-center gap-2">
    <app-button variant="secondary" (click)="modalRef.close()">{{ t('cancelButton') }}</app-button>
    <app-button variant="primary" (click)="updateBooksShelves()">{{ t('saveChanges') }}</app-button>
  </div>
</div>
</ng-container>
